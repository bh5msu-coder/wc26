<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WC26 — Web App Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  @font-face {
    font-family: 'Twemoji Country Flags';
    unicode-range: U+1F1E6-1F1FF, U+1F3F4, U+E0062-E0063, U+E0065, U+E0067, U+E006C, U+E006E, U+E0073-E0074, U+E0077, U+E007F;
    src: url('https://cdn.jsdelivr.net/npm/country-flag-emoji-polyfill@0.1.8/dist/TwemojiCountryFlags.woff2') format('woff2');
    font-display: swap;
  }
  :root{
    --bg:#0a0e15; --surface:#121a26; --surface2:#1a2433;
    --line:rgba(255,255,255,.09); --lineStrong:rgba(255,255,255,.16);
    --text:#f3f7fc; --dim:rgba(243,247,252,.6); --faint:rgba(243,247,252,.34);
    --accent:#c6ff3a; --accentInk:#0a0e15; --accent2:#3b86ff;
    --pos:#34e29b; --neg:#ff5c72; --gold:#ffc83d; --chip:rgba(255,255,255,.06);
    --body:'Archivo','Twemoji Country Flags',system-ui,sans-serif;
    --display:'Anton','Twemoji Country Flags',sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:radial-gradient(120% 80% at 50% -10%, #16243a 0%, #0a0e15 55%) fixed, var(--bg);
    color:var(--text); font-family:var(--body); min-height:100vh; -webkit-font-smoothing:antialiased;
  }
  .flag{font-family:'Twemoji Country Flags',var(--body)}
  .display{font-family:var(--display);text-transform:uppercase;letter-spacing:.02em;line-height:1}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--lineStrong);border-radius:99px}
  button{font-family:inherit;cursor:pointer}
  a{color:inherit;text-decoration:none}

  /* shell */
  .app{display:flex;min-height:100vh}
  .side{position:sticky;top:0;height:100vh;width:244px;flex-shrink:0;display:flex;flex-direction:column;
    justify-content:space-between;border-right:1px solid var(--line);background:rgba(10,14,21,.6);padding:20px}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:28px}
  .logo{width:36px;height:36px;border-radius:11px;background:var(--accent);display:flex;align-items:center;justify-content:center}
  .navlink{display:flex;align-items:center;gap:12px;border-radius:12px;padding:10px 12px;color:var(--dim);border:1px solid transparent;font-weight:700;font-size:14px}
  .navlink.active{background:var(--surface);border-color:var(--line);color:var(--text)}
  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{display:none}
  .wrap{width:100%;max-width:1120px;margin:0 auto;padding:32px;flex:1}
  .tabbar{display:none}

  .eyebrow{font-size:11px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:var(--faint)}
  .h1{font-size:30px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:18px}
  .seclabel{font-size:12.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);padding:0 2px 10px}
  .chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-weight:700;font-size:11.5px;line-height:1;white-space:nowrap}
  .grid2{display:grid;gap:24px}
  @media(min-width:1000px){ .grid2.lead{grid-template-columns:1.1fr .9fr} .grid2.pred{grid-template-columns:1.05fr .95fr} }

  /* mobile */
  @media(max-width:860px){
    .side{display:none}
    .topbar{display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30;
      border-bottom:1px solid var(--line);background:rgba(10,14,21,.85);backdrop-filter:blur(10px);padding:12px 16px}
    .wrap{padding:20px 16px 110px}
    .tabbar{display:flex;position:fixed;inset:auto 0 0 0;z-index:30;justify-content:space-around;
      border-top:1px solid var(--line);background:rgba(10,14,21,.86);backdrop-filter:blur(10px);padding:8px 6px 24px}
    .tabbar .navlink{flex-direction:column;gap:4px;border:none;background:none;padding:2px;font-size:9.5px;color:var(--faint)}
    .h1{font-size:26px}
  }
  .avatar{display:flex;align-items:center;justify-content:center;color:#0a0e15;font-weight:800;border-radius:999px;flex-shrink:0}
  .flagtile{display:flex;align-items:center;justify-content:center;background:var(--chip);border:1px solid var(--line);overflow:hidden;flex-shrink:0}
  .bar{width:100%;height:8px;border-radius:99px;background:var(--chip);overflow:hidden}
  .bar>span{display:block;height:100%;border-radius:99px;transition:width .5s}
  .seg{display:flex;gap:4px;border-radius:999px;padding:4px;background:var(--surface2)}
  .seg button{border:none;border-radius:999px;padding:5px 12px;font-weight:700;font-size:12px;background:transparent;color:var(--dim)}
  .seg button.on{background:var(--accent);color:var(--accentInk)}
  .livedot{position:relative;display:inline-flex;width:8px;height:8px}
  .livedot i{position:absolute;border-radius:99px;background:var(--neg)}
  .livedot i.p{inset:0;animation:pulse 1.6s ease-out infinite}
  .livedot i.d{inset:1.5px}
  @keyframes pulse{0%{transform:scale(1);opacity:.7}70%{transform:scale(2.6);opacity:0}100%{transform:scale(2.6);opacity:0}}
  input[type=range]{accent-color:var(--accent);width:100%}
</style>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" rx="22" fill="#0A0E15"/>
    <circle cx="50" cy="44" r="22" fill="none" stroke="#C6FF3A" stroke-width="3"/>
    <path d="M50 30l10 7-4 12H44l-4-12z" fill="#C6FF3A"/>
    <rect x="30" y="72" width="40" height="6" rx="3" fill="#C6FF3A"/>
  </svg>
</template>

<script src="preview-data.js"></script>
<script src="preview-app.js"></script>
</body>
</html>
